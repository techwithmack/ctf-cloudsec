name: Deploy

on:
  push:
    branches:
      - 'deploy/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    enable-openid-connect: true
    env:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      FLAG_SECRET_ID: ${{ secrets.FLAG_SECRET_ID }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Set up tooling
        run: |
          apt-get update -qq
          apt-get install -y -qq curl jq unzip >/dev/null
          curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
          unzip -q awscliv2.zip
          ./aws/install >/dev/null

      - name: Assume the deploy role via OIDC and sync production config
        run: |
          set -euo pipefail
          ID_TOKEN=$(curl -s -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" | jq -r .value)

          CREDS=$(aws sts assume-role-with-web-identity \
            --role-arn "${AWS_DEPLOY_ROLE_ARN}" \
            --role-session-name "deploy-session" \
            --web-identity-token "${ID_TOKEN}" \
            --duration-seconds 900)

          export AWS_ACCESS_KEY_ID=$(echo "${CREDS}" | jq -r .Credentials.AccessKeyId)
          export AWS_SECRET_ACCESS_KEY=$(echo "${CREDS}" | jq -r .Credentials.SecretAccessKey)
          export AWS_SESSION_TOKEN=$(echo "${CREDS}" | jq -r .Credentials.SessionToken)

          echo "Running production deployment sync..."
          aws secretsmanager get-secret-value \
            --secret-id "${FLAG_SECRET_ID}" \
            --region "${AWS_REGION}" \
            --query SecretString --output text
